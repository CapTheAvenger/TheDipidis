name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase Credentials
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::warning::FIREBASE_CONFIG secret is not set – deploying with placeholder credentials"
          else
            echo "$FIREBASE_CONFIG" > js/firebase-credentials.js
            echo "✓ Firebase credentials injected"
          fi

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/css
          cp -r js _site/js
          cp -r images _site/images 2>/dev/null || true
          cp -r data _site/data
          cp pokemon_sets_mapping.csv _site/ 2>/dev/null || true
          cp _config.yml _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
