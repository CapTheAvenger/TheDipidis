name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS test dependencies
        run: npm install --no-save papaparse

      - name: Run JS unit tests
        run: |
          TOTAL_PASS=0
          TOTAL_FAIL=0
          for f in tests/unit/test-*.js; do
            OUTPUT=$(node --test "$f" 2>&1) || true
            PASS=$(echo "$OUTPUT" | grep -oP '# pass \K\d+' || echo 0)
            FAIL=$(echo "$OUTPUT" | grep -oP '# fail \K\d+' || echo 0)
            TOTAL_PASS=$((TOTAL_PASS + PASS))
            TOTAL_FAIL=$((TOTAL_FAIL + FAIL))
            if [ "$FAIL" -gt 0 ]; then
              echo "::error::$f — $FAIL test(s) failed"
              echo "$OUTPUT"
            fi
          done
          echo "✓ JS tests: $TOTAL_PASS passed, $TOTAL_FAIL failed"
          if [ "$TOTAL_FAIL" -gt 0 ]; then
            echo "::error::$TOTAL_FAIL JS test(s) failed — blocking deployment"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          pip install pytest beautifulsoup4 requests lxml

      - name: Run Python unit tests
        run: |
          set +e
          python -m pytest tests/python/ -q --tb=short \
            --ignore=tests/python/test_price_proxy_and_price_scraper.py \
            2>&1
          PYTEST_EXIT=$?
          set -e

          if [ "$PYTEST_EXIT" -eq 0 ]; then
            echo "✓ Python tests passed"
          elif [ "$PYTEST_EXIT" -eq 5 ]; then
            echo "::warning::No Python tests were collected in tests/python - continuing"
          else
            echo "::error::Python tests failed with exit code $PYTEST_EXIT"
            exit "$PYTEST_EXIT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Python syntax
        run: |
          python3 -m py_compile backend/core/card_scraper_shared.py
          python3 -m py_compile backend/scrapers/city_league_analysis_scraper.py
          python3 -m py_compile backend/scrapers/current_meta_analysis_scraper.py
          echo "✓ All Python files pass syntax check"

      - name: Install npm tools
        run: npm install -g terser clean-css-cli html-minifier-terser

      - name: Validate JS syntax
        run: |
          shopt -s nullglob
          for f in js/*.js; do
            terser "$f" --no-module -o /dev/null 2>/dev/null || { echo "::error::Syntax error in $f"; exit 1; }
          done
          echo "✓ All JS files pass syntax check"

      - name: Inject Firebase Credentials
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::warning::FIREBASE_CONFIG secret is not set – deploying with placeholder credentials"
          else
            echo "$FIREBASE_CONFIG" > js/firebase-credentials.js
            echo "✓ Firebase credentials injected"
          fi
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            echo "window.GOOGLE_CLIENT_ID = \"${GOOGLE_CLIENT_ID}\";" >> js/firebase-credentials.js
            echo "✓ Google Client ID injected"
          else
            echo "::warning::GOOGLE_CLIENT_ID secret is not set – Google Sign-In will be disabled"
          fi

      - name: Inject Sentry DSN
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            sed -i "s|__SENTRY_DSN__|${SENTRY_DSN}|g" js/error-tracking.js
            echo "✓ Sentry DSN injected"
          else
            echo "::warning::SENTRY_DSN secret is not set – error tracking will be disabled"
          fi

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.json _site/
          cp service-worker.js _site/
          cp .nojekyll _site/
          cp -r css _site/css
          cp -r js _site/js
          cp -r images _site/images 2>/dev/null || true
          cp -r data _site/data
          cp pokemon_sets_mapping.csv _site/ 2>/dev/null || true
          mkdir -p _site/config
          cp config/current_meta_analysis_settings.json _site/config/ 2>/dev/null || true
          cp _config.yml _site/ 2>/dev/null || true

      - name: Minify JS, CSS & HTML
        run: |
          shopt -s nullglob
          for f in _site/js/*.js; do
            terser "$f" --compress --mangle -o "${f}.min" && mv "${f}.min" "$f" || { echo "::error::Minification failed for $f"; exit 1; }
          done
          for f in _site/css/*.css; do
            cleancss -o "${f}.min" "$f" && mv "${f}.min" "$f" || { echo "::error::CSS minification failed for $f"; exit 1; }
          done
          html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o _site/index.html _site/index.html || echo "::warning::HTML minification skipped"
          echo "✓ Minification complete"

      - name: Optimize images
        run: |
          sudo apt-get install -y -qq optipng > /dev/null 2>&1
          find _site/images -name '*.png' -exec optipng -o2 -quiet {} + 2>/dev/null || true
          echo "✓ Image optimization complete"

      - name: Cache-bust asset references
        run: |
          HASH=$(git rev-parse --short HEAD)
          sed -i "s/\?v=[^\"]*/\?v=${HASH}/g" _site/index.html
          for f in _site/js/*.js; do
            sed -i "s/\?v=[^'\"]*/\?v=${HASH}/g" "$f"
          done
          echo "✓ Cache-busted with hash ${HASH}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
