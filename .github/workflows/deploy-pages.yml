name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Python syntax
        run: |
          python3 -m py_compile backend/core/card_scraper_shared.py
          python3 -m py_compile backend/scrapers/city_league_analysis_scraper.py
          python3 -m py_compile backend/scrapers/current_meta_analysis_scraper.py
          echo "✓ All Python files pass syntax check"

      - name: Install npm tools
        run: npm install -g terser clean-css-cli html-minifier-terser

      - name: Validate JS syntax
        run: |
          shopt -s nullglob
          for f in js/*.js; do
            terser "$f" --no-module -o /dev/null 2>/dev/null || { echo "::error::Syntax error in $f"; exit 1; }
          done
          echo "✓ All JS files pass syntax check"

      - name: Inject Firebase Credentials
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::warning::FIREBASE_CONFIG secret is not set – deploying with placeholder credentials"
          else
            echo "$FIREBASE_CONFIG" > js/firebase-credentials.js
            echo "✓ Firebase credentials injected"
          fi
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            echo "window.GOOGLE_CLIENT_ID = \"${GOOGLE_CLIENT_ID}\";" >> js/firebase-credentials.js
            echo "✓ Google Client ID injected"
          else
            echo "::warning::GOOGLE_CLIENT_ID secret is not set – Google Sign-In will be disabled"
          fi

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/css
          cp -r js _site/js
          cp -r images _site/images 2>/dev/null || true
          cp -r data _site/data
          cp pokemon_sets_mapping.csv _site/ 2>/dev/null || true
          cp current_meta_analysis_settings.json _site/ 2>/dev/null || true
          cp _config.yml _site/ 2>/dev/null || true

      - name: Minify JS, CSS & HTML
        run: |
          shopt -s nullglob
          for f in _site/js/*.js; do
            terser "$f" --compress --mangle -o "${f}.min" && mv "${f}.min" "$f" || { echo "::error::Minification failed for $f"; exit 1; }
          done
          for f in _site/css/*.css; do
            cleancss -o "${f}.min" "$f" && mv "${f}.min" "$f" || { echo "::error::CSS minification failed for $f"; exit 1; }
          done
          html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o _site/index.html _site/index.html || echo "::warning::HTML minification skipped"
          echo "✓ Minification complete"

      - name: Optimize images
        run: |
          sudo apt-get install -y -qq optipng > /dev/null 2>&1
          find _site/images -name '*.png' -exec optipng -o2 -quiet {} + 2>/dev/null || true
          echo "✓ Image optimization complete"

      - name: Cache-bust asset references
        run: |
          HASH=$(git rev-parse --short HEAD)
          sed -i "s/\?v=[^\"]*/\?v=${HASH}/g" _site/index.html
          for f in _site/js/*.js; do
            sed -i "s/\?v=[^'\"]*/\?v=${HASH}/g" "$f"
          done
          echo "✓ Cache-busted with hash ${HASH}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
