name: Generate AI Archetype Tooltips

on:
  schedule:
    - cron: '0 6 * * 0'   # Jeden Sonntag um 06:00 UTC
  workflow_dispatch:        # Manuell auslösbar

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai

      - name: Generate tooltips
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python backend/scrapers/generate_tooltips.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated_tooltips.json
          git diff --cached --quiet || git commit -m "chore: update AI-generated archetype tooltips [skip ci]"
          git push
