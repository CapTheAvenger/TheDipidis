name: Monthly Card Database Update

on:
  schedule:
    # First day of each month at 01:00 UTC (02:00 CET / 03:00 CEST) - runs at night
    - cron: '0 1 1 * *'
  workflow_dispatch: # Allows manual execution

jobs:
  update-card-database:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 4 hours timeout for large card database
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: CapTheAvenger/TheDipidis
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      
      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Japanese Cards Scraper
        run: |
          echo "================================"
          echo "Japanese Cards Scraper (Latest 4 Sets)"
          echo "================================"
          python japanese_cards_scraper.py
        continue-on-error: true
        env:
          HEADLESS: 'true'
      
      - name: Run All Cards Scraper
        run: |
          echo "================================"
          echo "All Cards Database Scraper"
          echo "================================"
          python all_cards_scraper.py
        continue-on-error: true
        env:
          HEADLESS: 'true'
      
      - name: Update Card Data
        run: |
          python prepare_card_data.py
      
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv data/*.json data/*.html data/*.js
          git diff --staged --quiet || git commit -m "🤖 Automated monthly card database update - $(date +'%d.%m.%Y')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: card-database-logs
          path: |
            *.log
            data/debug_*.html
          retention-days: 7
          if-no-files-found: ignore
