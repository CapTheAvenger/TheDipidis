name: Visual Fullpage Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  visual-fullpage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run fullpage visual suite
        run: npm run test:visual:fullpage:ci

      - name: Upload fullpage visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-fullpage-report
          path: |
            test-results
            playwright-report
            tests/e2e/__snapshots__
