name: Weekly Full Update

# Runs the headless-friendly subset of the local "FULL SYSTEM UPDATE"
# batch (BATCH_FULL in start_scraper_dashboard.py), minus the three
# Chrome-dependent scrapers — those are scheduled separately when a
# new set drops:
#   - all_cards_scraper
#   - japanese_cards_scraper
#   - card_price_scraper
#
# Schedule: Tuesday 06:00 UTC (= 07:00 CET winter / 08:00 CEST summer)
# Manual trigger: GitHub UI → Actions → Weekly Full Update → Run workflow
on:
  schedule:
    - cron: '0 6 * * 2'
  workflow_dispatch:

# GITHUB_TOKEN needs:
#   - contents: write  → commit + push the scraped CSVs
#   - actions:  write  → kick off deploy-pages.yml at the end (push events
#                        from GITHUB_TOKEN don't trigger downstream
#                        workflows by default, so we dispatch explicitly)
permissions:
  contents: write
  actions:  write

# actions/checkout@v6 and actions/setup-python@v6 declare Node 24
# natively — no FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 hack needed.
# (Earlier the workflow used v4 / v5 + the env-var override, which
# still triggered a deprecation annotation because the action.yml
# files in those tags hard-code 'node20'. The v6 lines below are
# the proper fix.)

# Don't run multiple weekly updates in parallel — they'd race on the
# same monolith CSVs and produce conflicting commits.
concurrency:
  group: weekly-full-update
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Python 3.12+ is required: limitless_online_scraper uses PEP-701
      # f-string syntax (nested f-strings sharing the outer quote
      # delimiter) which 3.11 rejects with "invalid decimal literal".
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Seed backend/core/data/ from the project-root data/ folder.
      #
      # Locally, scrapers READ from backend/core/data/ and the
      # prepare_card_data.py finalizer SYNCS the results back to data/
      # for the frontend. On the GitHub runner only data/ is checked
      # out (that's what the frontend ships), so backend/core/data/
      # starts empty — and the dependency files like
      # all_cards_database.csv are unreachable, producing
      # "Karten-Datenbank ist leer!" errors in every scraper that
      # needs them.
      #
      # Seed backend/core/data/ with both the scraper INPUTS and the
      # prior-run OUTPUTS. Three categories, each load-bearing:
      #
      # (a) Input dependencies — card DBs, ID mapping, sets.json etc.
      #     Without these the scrapers' lookups fail outright.
      #
      # (b) State files (*_scraped*.json) — list of tournament IDs each
      #     incremental scraper has already processed. Without them the
      #     scraper thinks zero tournaments are scraped → tries to fetch
      #     all ~624 fresh, hits Cloudflare 429s + the 180-min job
      #     timeout, and produces a partial CSV.
      #
      # (c) Prior output CSVs — append-mode scrapers (city_league_analysis,
      #     current_meta_analysis, tournament_jh) MERGE new rows into
      #     existing CSVs at save_to_csv time. If the existing CSV isn't
      #     present in backend/core/data/, save_to_csv treats it as empty
      #     and writes only the new rows → after prepare_card_data.py
      #     syncs that tiny CSV back to data/, the historical rows are
      #     gone. This actually happened on 2026-05-02 (commit 8972aec)
      #     when (b) was added without (c): seed file said "all 744 IDs
      #     already scraped, skip them all" → scraper found 0 new
      #     tournaments → wrote a 1-row CSV → sync overwrote 152 588
      #     historical rows. (b) and (c) MUST stay paired; if you change
      #     either list, mirror it on the other side.
      #
      # prepare_card_data.SYNC_PATTERNS is the matching write-back list —
      # keep the two in lockstep when adding a new scraper output.
      - name: Seed backend/core/data/ from data/
        run: |
          mkdir -p backend/core/data
          for f in \
              all_cards_database.csv \
              japanese_cards_database.csv \
              cardmarket_id_mapping.csv \
              price_data.csv \
              sets.json \
              sets_metadata.json \
              format_window.json \
              archetype_icons.json \
              formats_catalog.json \
              pokemon_card_text.json \
              pokemon_card_effects.json \
              active_threats.json \
              online_tournament_dated_cards.csv \
              online_tournament_dated_scraped.json \
              city_league_analysis_scraped.json \
              tournament_jh_scraped.json \
              current_meta_scraped_tournaments.json \
              city_league_analysis.csv \
              city_league_archetypes.csv \
              city_league_archetypes_comparison.csv \
              city_league_archetypes_comparison_M3.csv \
              city_league_archetypes_deck_stats.csv \
              current_meta_card_data.csv \
              tournament_cards_data_cards.csv \
              tournament_cards_data_overview.csv \
              labs_tournament_decks.csv \
              labs_tournaments.json \
              limitless_online_decks.csv \
          ; do
              if [ -f "data/$f" ]; then
                  cp "data/$f" "backend/core/data/$f"
                  echo "  seeded: $f"
              fi
          done

      # Cardmarket publishes daily JSON dumps on a public S3 bucket.
      # The cardmarket_id_mapper / cardmarket_price_merger scrapers
      # expect them at data/{products_singles_6,products_nonsingles_6,price_guide_6}.json.
      - name: Download Cardmarket JSONs
        run: |
          mkdir -p data
          curl -fsSL --retry 3 -o data/products_singles_6.json    https://downloads.s3.cardmarket.com/productCatalog/productList/products_singles_6.json
          curl -fsSL --retry 3 -o data/products_nonsingles_6.json https://downloads.s3.cardmarket.com/productCatalog/productList/products_nonsingles_6.json
          curl -fsSL --retry 3 -o data/price_guide_6.json         https://downloads.s3.cardmarket.com/productCatalog/priceGuide/price_guide_6.json
          ls -lh data/*_6.json

      # Run scrapers in BATCH_FULL order (minus the Chrome trio).
      # `set +e` so a single scraper failure doesn't abort the whole
      # batch — we want partial progress committed at the end so we
      # don't lose six successful scrapers because one had a network
      # hiccup. Each failure is surfaced as a workflow warning so the
      # Actions UI shows it clearly.
      - name: Run scrapers
        env:
          PYTHONPATH: ${{ github.workspace }}/backend/core
        working-directory: backend
        run: |
          set +e
          rc_summary=()
          for step in \
              "core/update_sets.py" \
              "scrapers/cardmarket_id_mapper.py" \
              "scrapers/current_meta_analysis_scraper.py" \
              "scrapers/limitless_online_scraper.py" \
              "scrapers/city_league_analysis_scraper.py" \
              "scrapers/city_league_archetype_scraper.py" \
              "scrapers/tournament_scraper_JH.py" \
              "scrapers/labs_tournament_scraper.py" \
              "scrapers/online_tournament_scraper.py" \
              "scrapers/cardmarket_price_merger.py" \
              "core/prepare_card_data.py" \
              "scrapers/archetype_icons_scraper.py" \
              "scrapers/pokemon_card_text_scraper.py" \
              "scrapers/pokemon_card_effects_scraper.py" \
              "scrapers/online_tournament_dated_scraper.py" \
              "tools/build_threat_intel.py" \
          ; do
              echo "::group::$step"
              python "$step"
              rc=$?
              if [ "$rc" -ne 0 ]; then
                  echo "::warning::Scraper $step exited with $rc (continuing batch)"
                  rc_summary+=("FAIL $step (rc=$rc)")
              else
                  rc_summary+=("OK   $step")
              fi
              echo "::endgroup::"
          done
          echo "── Summary ──"
          printf '  %s\n' "${rc_summary[@]}"

      - name: Bump version
        run: |
          chmod +x bump-version.sh
          ./bump-version.sh

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            backend/data/*.log
            backend/logs/**/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit + push
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — nothing to push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ts="$(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "Auto: weekly full update — ${ts}

          Triggered by .github/workflows/weekly-full-update.yml
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Push with retry — the scraper job runs ~45 min, in which
          # time origin/main can advance (manual pushes from the
          # maintainer, an earlier scheduled run still committing,
          # etc.). A naive `git push` would 'rejected (fetch first)'
          # and the whole hour of scraped data would sit unpushed.
          #
          # Strategy: pull --rebase with -X ours so our just-baked
          # data + version-bump win on conflict (this run's outputs
          # are by definition the newest snapshot). -X ours only
          # affects FILES BOTH SIDES MODIFIED — code-only changes
          # the maintainer pushed are untouched and ride along on
          # the rebase base. Three attempts, brief sleep between
          # them, then loud failure with the artifact still safe
          # in the runner's checkout.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — pulling with rebase…"
            if ! git pull --rebase=true -X ours origin main; then
              echo "::error::Rebase conflict beyond version files — manual resolution needed"
              git rebase --abort || true
              exit 1
            fi
          done
          echo "::error::Push failed after 3 attempts — origin/main churns too fast"
          exit 1

      # Pushes authenticated with GITHUB_TOKEN don't trigger other
      # `on: push` workflows (GitHub recursion-prevention). Dispatch
      # deploy-pages explicitly so the SPA on Pages always reflects the
      # fresh data right after a weekly run.
      - name: Trigger GitHub Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml --ref main
          echo "Dispatched deploy-pages.yml on main."
