name: Weekly Price Update

on:
  schedule:
    # Jeden Montag um 6:00 Uhr UTC (7:00 MEZ Winter, 8:00 MESZ Sommer)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Ermöglicht manuelles Starten über GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml selenium
          
          # Install Chrome and ChromeDriver for Selenium
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
      
      - name: Run Price Scraper
        continue-on-error: false
        run: |
          echo "================================================"
          echo "🏷️  WEEKLY PRICE UPDATE"
          echo "================================================"
          echo "Starting price scraper..."
          echo ""
          python card_price_scraper.py
          echo ""
          echo "✅ Price scraper completed"
      
      - name: Check for Price Changes
        id: check_changes
        run: |
          if git diff --quiet data/price_data.csv; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No price changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Price changes detected"
          fi
      
      - name: Commit and Push Price Updates
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          # Datum für Commit-Message
          TIMESTAMP=$(date +'%d.%m.%Y %H:%M')
          DAY=$(date +'%A')
          
          # Stage price_data.csv
          git add data/price_data.csv
          
          # Commit
          git commit -m "🏷️ Weekly price update - ${DAY}, ${TIMESTAMP}" || exit 0
          
          # Push zu main branch
          git push origin main
          
          echo "✅ Price updates pushed to main branch"
      
      - name: Deploy to GitHub Pages
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          echo "Deploying to GitHub Pages..."
          
          # Checkout gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages
          
          # Merge main branch changes
          git merge origin/main -m "🏷️ Deploy: Weekly price update"
          
          # Push to gh-pages
          git push origin gh-pages
          
          echo "✅ Price updates deployed to GitHub Pages"
      
      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "📊 WEEKLY PRICE UPDATE SUMMARY"
          echo "================================================"
          if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
            echo "✅ Prices updated successfully"
          else
            echo "ℹ️  No price changes (already up-to-date)"
          fi
          echo "📅 Run completed at: $(date +'%d.%m.%Y %H:%M:%S')"
          echo ""
          echo "🌐 Website: https://captheavenger.github.io/HausiTCG/"
          echo "================================================"
