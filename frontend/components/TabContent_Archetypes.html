<div class="city-league-container">
    <div class="city-league-header">
        <h2><span data-i18n="cl.cityLeagueDev">🇯🇵 City League Development</span> <button class="tab-help-btn" onclick="openTabHelp('city-league')" title="Help" data-i18n-title="btn.helpTitle"></button></h2>
        <div class="format-toggle-container" style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <select id="cityLeagueFormatSelect" onchange="switchCityLeagueFormat(this.value)" style="padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); font-weight: bold; background: var(--primary-blue); color: var(--text-main); cursor: pointer;">
                <option value="M4" data-i18n="format.m4current">Current Meta</option>
                <option value="M3" data-i18n="format.m3archive">Past Meta</option>
            </select>
        </div>
    </div>
    <div id="cityLeagueContent" style="padding: 12px; background: #ffffff;">
        <div id="cityLeagueTierSections"></div>
        <div style="text-align: center; padding: 20px; color: var(--text-muted);" data-i18n="misc.loading">Loading...</div>
    </div>
</div>
